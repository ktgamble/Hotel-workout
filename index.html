<!DOCTYPE html>

<title>Hotel Workout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;padding:20px 14px 48px;max-width:680px;margin:0 auto}
button{cursor:pointer;font-family:inherit}
.eyebrow{font-size:13px;letter-spacing:3px;color:#475569;text-transform:uppercase;margin-bottom:5px;text-align:center}
h1{font-size:28px;font-weight:800;text-align:center}
.subtitle{font-size:15px;color:#64748b;margin-top:4px;text-align:center;margin-bottom:24px}
.ab-toggle{display:flex;gap:8px;background:#1e293b;border-radius:12px;padding:5px;margin-bottom:16px}

.ab-btn.active-a{background:#6366f1;color:#fff}
.ab-btn.active-b{background:#10b981;color:#fff}
.card{background:#1e293b;border-radius:14px;padding:16px 18px;margin-bottom:12px}
.card-label{font-size:13px;letter-spacing:2px;text-transform:uppercase;margin-bottom:7px}
.timeline{display:flex;gap:5px;margin-top:10px}
.tl-seg{text-align:center}
.tl-box{border-radius:7px;padding:8px 3px;margin-bottom:4px}
.tl-time{font-size:14px;font-weight:700}
.tl-lbl{font-size:12px;color:#475569}
.row{display:flex;gap:10px;align-items:center;margin-bottom:8px}
.row-time{font-size:14px;font-weight:700;min-width:44px}
.row-desc{font-size:15px;color:#94a3b8}
.tread-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:8px}
.tread-name{font-size:21px;font-weight:800}
.tread-meta{display:flex;gap:8px;margin-top:5px;align-items:center}
.badge{font-size:13px;font-weight:700;border-radius:6px;padding:3px 10px;border:1px solid}
.count{font-size:13px;color:#475569}
.dice-btn{border-radius:9px;padding:9px 14px;font-size:14px;font-weight:700;border:1px solid;background:transparent;white-space:nowrap}
.goal{font-size:15px;color:#94a3b8;font-style:italic;margin-bottom:12px}

.zone-badge{font-size:14px;font-weight:700;border-radius:5px;padding:4px 11px;border:1px solid}
.speed-label{font-size:12px;color:#475569;margin-left:auto}
.interval-row{display:flex;gap:8px;align-items:center;padding:12px 14px;background:#0f172a;border-radius:8px;margin-bottom:4px;border-left:3px solid}
.iv-time{font-size:18px;font-weight:700;min-width:100px}
.iv-desc{flex:1;font-size:20px;font-weight:600}
.speeds-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.speed-field{background:#0f172a;border-radius:10px;padding:11px 13px;display:flex;flex-direction:column;gap:5px}
.speed-field-label{font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.speed-input{background:transparent;border:none;border-bottom:1px solid #334155;color:#f1f5f9;font-size:22px;font-weight:700;width:100%;outline:none;padding:2px 0;font-family:inherit}
.speed-input::placeholder{color:#334155}

.circuit-timing{font-size:14px;color:#475569;margin-top:2px}

.circuit-body{padding:0 14px 14px;display:flex;flex-direction:column;gap:8px}
.lift-card{padding:13px 14px;border-radius:9px;border:1px solid}

.lift-meta{display:flex;gap:7px;align-items:center;margin-bottom:6px}

.lift-note{font-size:14px;color:#64748b;margin-top:4px}

.section-sub{font-size:15px;color:#94a3b8;margin-top:4px}

<div id="app"></div>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const pools = {
  leg:      { reps:"10–15 reps", exercises:["Squat Press","Goblet Squat","Reverse Lunge","Cossack Squat","Jump Squat"] },
  legB:     { reps:"10–15 reps", exercises:["Goblet Squat","Reverse Lunge","Cossack Squat","Jump Squat","Bulgarian Split Squat"] },
  hinge:    { reps:"10–15 reps", exercises:["Snatch","Single Leg RDL","RDL","Clean"] },
  push:     { reps:"15–18 reps", exercises:["Flat Chest Press","Incline Chest Press","Push-up","Wide Push-up","Diamond Push-up","Shoulder Press","Tricep Extension","Pike Push-up"] },
  pull:     { reps:"10–15 reps", exercises:["Bent-Over Row","Single Arm Row","Renegade Row","Face Pull"] },
  shoulder: { reps:"10–15 reps", exercises:["Shoulder Press","Lateral Raise","Front Raise","Arnold Press","Upright Row","Rear Delt Fly","Cuban Press"] },
  bicep:    { reps:"10–15 reps", exercises:["Bicep Curl","Hammer Curl","Zottman Curl","Dumbbell Figure 8"] },
  tricep:   { reps:"10–15 reps", exercises:["Tricep Extension","Overhead Tricep Extension","Tricep Kickback","Diamond Push-up"] },
  core:     { reps:"15–20 reps", exercises:["Plank Drags","Shoulder Taps","V-Ups","Dead Bug","Hollow Hold","Bicycle Crunch","Leg Raise","Plank to Down Dog","Russian Twist"] },
};

function pick(pool, exclude=[]) {
  const opts = pools[pool].exercises.filter(e=>!exclude.includes(e));
  return opts[Math.floor(Math.random()*opts.length)];
}

function generateA({withPullups=false,withDips=false}={}) {
  const leg1=  "Squat Press";
  const leg2=  pick("leg",[leg1]);
  const pull1= withPullups?"Pull-ups":pick("pull");
  const core1= pick("core");
  const push1= pick("push");
  const push2= withDips?"Dips":pick("push",[push1]);
  const hinge1=pick("hinge");
  const core2= pick("core",[core1]);
  const sh1=   pick("shoulder");
  const sh2=   pick("shoulder",[sh1]);
  const leg3=  pick("leg",[leg1,leg2]);
  return [
    { label:"Lift Circuit 1 — Legs + Pull + Core", timing:"~11 min", lifts:[
      {slot:"Lift 1",cat:"Leg",          ex:leg1,  reps:pools.leg.reps,  note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Leg (Superset)",ex:leg2,  reps:pools.leg.reps,  note:"Rest 60s after completing the superset"},
      {slot:"Lift 3",cat:"Pull",         ex:pull1, reps:pools.pull.reps, note:"Rest 60s after"},
      {slot:"Lift 4",cat:"Core",         ex:core1, reps:pools.core.reps, note:"Rest 60s, then begin Lift Circuit 2"},
    ]},
    { label:"Lift Circuit 2 — Push + Hinge + Core", timing:"~11 min", lifts:[
      {slot:"Lift 1",cat:"Push",           ex:push1,  reps:pools.push.reps,  note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Push (Superset)",ex:push2,  reps:pools.push.reps,  note:"Rest 60s after completing the superset"},
      {slot:"Lift 3",cat:"Hinge",          ex:hinge1, reps:pools.hinge.reps, note:"Rest 60s after"},
      {slot:"Lift 4",cat:"Core",           ex:core2,  reps:pools.core.reps,  note:"Rest 60s, then begin Lift Circuit 3"},
    ]},
    { label:"Lift Circuit 3 — Shoulder + Shoulder + Leg", timing:"~11 min", lifts:[
      {slot:"Lift 1",cat:"Shoulder",ex:sh1,  reps:pools.shoulder.reps,note:"Rest 60s after"},
      {slot:"Lift 2",cat:"Shoulder",ex:sh2,  reps:pools.shoulder.reps,note:"Rest 60s after"},
      {slot:"Lift 3",cat:"Leg",     ex:leg3, reps:pools.leg.reps,     note:"Finisher — rest as needed"},
    ]},
  ];
}

function generateB({withPullups=false,withDips=false}={}) {
  const h1=   pick("hinge");
  const h2=   pick("hinge",[h1]);
  const push1=pick("push");
  const core1=pick("core");
  const pull1=withPullups?"Pull-ups":pick("pull");
  const pull2=pick("pull",[pull1,"Pull-ups"]);
  const leg1= pick("legB");
  const core2=pick("core",[core1]);
  // Always alternate: one bicep, one tricep
  const bic=  pick("bicep");
  const tri=  withDips?"Dips":pick("tricep");
  const h3=   pick("hinge",[h1,h2]);
  const bicReps = bic==="Dumbbell Figure 8" ? "15–20 reps" : pools.bicep.reps;
  return [
    { label:"Lift Circuit 1 — Hinge + Push + Core", timing:"~11 min", lifts:[
      {slot:"Lift 1",cat:"Hinge",           ex:h1,    reps:pools.hinge.reps,note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Hinge (Superset)",ex:h2,    reps:pools.hinge.reps,note:"Rest 60s after completing the superset"},
      {slot:"Lift 3",cat:"Push",            ex:push1, reps:pools.push.reps, note:"Rest 60s after"},
      {slot:"Lift 4",cat:"Core",            ex:core1, reps:pools.core.reps, note:"Rest 60s, then begin Lift Circuit 2"},
    ]},
    { label:"Lift Circuit 2 — Pull + Leg + Core", timing:"~11 min", lifts:[
      {slot:"Lift 1",cat:"Pull",           ex:pull1,reps:pools.pull.reps,note:"Superset with Lift 2 — no rest between"},
      {slot:"Lift 2",cat:"Pull (Superset)",ex:pull2,reps:pools.pull.reps,note:"Rest 60s after completing the superset"},
      {slot:"Lift 3",cat:"Leg",            ex:leg1, reps:pools.legB.reps, note:"Rest 60s after"},
      {slot:"Lift 4",cat:"Core",           ex:core2,reps:pools.core.reps,note:"Rest 60s, then begin Lift Circuit 3"},
    ]},
    { label:"Lift Circuit 3 — Arms + Arms + Hinge", timing:"~11 min", lifts:[
      {slot:"Lift 1",cat:"Bicep",  ex:bic, reps:bicReps,        note:"Rest 60s after"},
      {slot:"Lift 2",cat:"Tricep", ex:tri, reps:pools.tricep.reps, note:"Rest 60s after"},
      {slot:"Lift 3",cat:"Hinge",  ex:h3,  reps:pools.hinge.reps, note:"Finisher — rest as needed"},
    ]},
  ];
}

// Weighted treadmill selection — Incline Surge (1) and Everest (10) ~15% each
const TREAD_WEIGHTS = treadPool.map((_,i)=>(i===1||i===10)?15:7);
const TREAD_TOTAL   = TREAD_WEIGHTS.reduce((a,b)=>a+b,0);
function randTread(exclude=-1) {
  let idx, tries=0;
  do {
    let r=Math.random()*TREAD_TOTAL, i=0;
    for(;i<TREAD_WEIGHTS.length;i++){r-=TREAD_WEIGHTS[i];if(r<=0)break;}
    idx=i; tries++;
  } while(idx===exclude && tries<20);
  return idx;
}

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (!s) return;
    if (s.workout)                          state.workout     = s.workout;
    if (typeof s.treadIdxA==="number")      state.treadIdxA   = s.treadIdxA;
    if (typeof s.treadIdxB==="number")      state.treadIdxB   = s.treadIdxB;
    if (typeof s.withPullups==="boolean")   state.withPullups = s.withPullups;
    if (typeof s.withDips==="boolean")      state.withDips    = s.withDips;
    if (s.roundsA)                          state.roundsA     = s.roundsA;
    if (s.roundsB)                          state.roundsB     = s.roundsB;
    if (s.speeds)                           state.speeds      = s.speeds;
  } catch(e){}
}

function saveState() {
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      workout:state.workout, treadIdxA:state.treadIdxA, treadIdxB:state.treadIdxB,
      withPullups:state.withPullups, withDips:state.withDips,
      roundsA:state.roundsA, roundsB:state.roundsB, speeds:state.speeds,
    }));
  } catch(e){}
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function el(tag,attrs,children) {
  const e=document.createElement(tag);
  for(const [k,v] of Object.entries(attrs||{})) {
    if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e.setAttribute(k,v);
  }
  if(typeof children==="string") e.textContent=children;
  else if(Array.isArray(children)) children.forEach(c=>c&&e.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return e;
}
function div(cls,children,style){return el("div",{class:cls||"",style:style||{}},children);}
function span(cls,text,style){return el("span",{class:cls||"",style:style||{}},text);}
function btn(cls,text,onclick,extraStyle){
  const b=el("button",{class:cls},text);
  Object.assign(b.style,extraStyle||{});
  b.addEventListener("click",onclick);
  return b;
}

    render();
    window.scrollTo({top:0,behavior:"smooth"});
  });
  compWrap.appendChild(compBtn);
  compWrap.appendChild(el("div",{class:"complete-hint"},"Generates next workout & saves it"));
  app.appendChild(compWrap);

  const foot=div("footer","Travel Hypertrophy System · A/B Rotation");
  app.appendChild(foot);
}

// ─── INIT ────────────────────────────────────────────────────────────────────
loadState();
render();
</script>
</body>
